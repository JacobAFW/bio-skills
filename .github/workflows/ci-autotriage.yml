# CI-fix loop: run the repo's own checks, and if they fail, let pipeline-triage
# diagnose the failure and open a PR/issue with the fix. It NEVER pushes to main
# and never resubmits/deletes anything — propose-don't-execute, like the skill.
#
# Verified against anthropics/claude-code-action@v1 (June 2026).
#
# To enable the live triage half (optional): install the Claude GitHub App
# (`/install-github-app` from Claude Code) and add ANTHROPIC_API_KEY to the repo's
# Actions secrets. Until then, green builds simply never invoke it.

name: CI + auto-triage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write       # create the fix branch
  pull-requests: write  # open the PR
  actions: read         # let the agent read this run's failed logs

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install pyyaml
      - name: Validate plugin manifests
        run: |
          python -m json.tool .claude-plugin/plugin.json > /dev/null
          python -m json.tool .claude-plugin/marketplace.json > /dev/null
      - name: Compile + dry-run the benchmark harness
        run: |
          python -m py_compile benchmarks/score_cases.py
          python benchmarks/score_cases.py
      - name: Check each skill has YAML frontmatter
        run: |
          for f in skills/*/SKILL.md; do
            head -1 "$f" | grep -q '^---$' || { echo "missing frontmatter: $f"; exit 1; }
          done
      # Real test suite goes here as the repo grows (pytest / Rscript / nextflow ...).

  triage:
    needs: test
    if: ${{ failure() }}                       # only when the test job failed
    runs-on: ubuntu-latest
    env:
      HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: No API key — skip auto-triage
        if: ${{ env.HAS_KEY != 'true' }}
        run: echo "ANTHROPIC_API_KEY not set; skipping auto-triage. See README to enable."
      - name: Triage the failure
        if: ${{ env.HAS_KEY == 'true' }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            RUN_ID: ${{ github.run_id }}

            The `test` job in this workflow run failed. Follow the diagnostic method
            in skills/pipeline-triage/SKILL.md (it's in this checkout).

            1. Read the failed job's logs for run ${{ github.run_id }}.
            2. Commit to the single most-likely root cause, citing the log lines.
            3. ONLY if there is a safe, minimal fix in this repo's code or config:
               create a new branch and open a pull request with the fix, putting the
               ROOT CAUSE / EVIDENCE / FIX summary in the PR body.
            4. If the cause is data, environment, or resources (not a repo fix), do
               NOT change code — open an issue with the diagnosis and suggested command.

            Hard rules: never push to main, never force-push, never delete files,
            never resubmit jobs. Propose; a human merges.
          claude_args: |
            --max-turns 15

# --- Productionised alternative -------------------------------------------------
# Once you want the published-plugin install instead of "read the SKILL.md file":
#   plugin_marketplaces: "https://github.com/<your-username>/bio-skills.git"
#   plugins: "bio-skills@bio-skills"
